{% extends 'base.html' %}

{% block page_title %}Edit Animal Profile{% endblock %}
{% block page_subtitle %}Update livestock information carefully{% endblock %}

{% block content %}
<section class="panel-card form-panel">
    <form method="POST" action="{{ url_for('edit_animal', animal_id=animal.id) }}" class="main-form">
        <div class="form-grid">
            <div class="form-group"><label>Tag Number</label><input type="text" name="tag_number" value="{{ animal.tag_number }}" required></div>
            <div class="form-group">
                <label>Animal Type</label>
                <select name="animal_type" required>
                    <option value="Cow" {% if animal.animal_type == 'Cow' %}selected{% endif %}>Cow</option>
                    <option value="Goat" {% if animal.animal_type == 'Goat' %}selected{% endif %}>Goat</option>
                </select>
            </div>
            <div class="form-group"><label>Name</label><input type="text" name="name" value="{{ animal.name }}" required></div>
            <div class="form-group"><label>Breed</label><input type="text" name="breed" value="{{ animal.breed }}" required></div>
            <div class="form-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="Male" {% if animal.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if animal.gender == 'Female' %}selected{% endif %}>Female</option>
                </select>
            </div>
            <div class="form-group"><label>Age in Months</label><input type="number" name="age_months" value="{{ animal.age_months }}" min="0" required></div>
            <div class="form-group"><label>Weight KG</label><input type="number" step="0.01" name="weight_kg" value="{{ animal.weight_kg }}" min="0" required></div>
            <div class="form-group"><label>Purchase Price</label><input type="number" step="0.01" name="purchase_price" value="{{ animal.purchase_price }}" min="0" required></div>
            <div class="form-group"><label>Purchase Date</label><input type="date" name="purchase_date" value="{{ animal.purchase_date.strftime('%Y-%m-%d') }}" required></div>
            <div class="form-group">
                <label>Status</label>
                <select name="status" required>
                    <option value="Available" {% if animal.status == 'Available' %}selected{% endif %}>Available</option>
                    <option value="Sold" {% if animal.status == 'Sold' %}selected{% endif %}>Sold</option>
                    <option value="Sick" {% if animal.status == 'Sick' %}selected{% endif %}>Sick</option>
                    <option value="Quarantine" {% if animal.status == 'Quarantine' %}selected{% endif %}>Quarantine</option>
                </select>
            </div>
            <div class="form-group full-width"><label>Location</label><input type="text" name="location" value="{{ animal.location }}" required></div>
            <div class="form-group full-width"><label>Notes</label><textarea name="notes">{{ animal.notes }}</textarea></div>
        </div>
        <div class="form-actions">
            <button type="submit">Update Animal</button>
            <a href="{{ url_for('animal_detail', animal_id=animal.id) }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
